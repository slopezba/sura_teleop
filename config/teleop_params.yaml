sura_teleop:
  ros__parameters:
    rate: 20.0
    joy_topic: /joy
    controller_switch_service: /controller_manager/switch_controller

    body_force_controller:
      name: body_force_controller

    stabilize_controller:
      name: stabilize_controller
      feedforward_topic: /stabilize_controller/feedforward
      enable_roll_pitch_service: /stabilize_controller/enable_roll_pitch
      disable_roll_pitch_service: /stabilize_controller/disable_roll_pitch

    depth_hold_controller:
      name: depth_hold_controller
      feedforward_topic: /depth_hold_controller/feedforward
      enable_roll_pitch_service: /depth_hold_controller/enable_roll_pitch
      disable_roll_pitch_service: /depth_hold_controller/disable_roll_pitch

    buttons:
      a: 0
      lb: 4
      rb: 5
      y: 3

    axes:
      hat_vertical: 7
      surge: 4
      sway: 3
      yaw: 0
      heave: 1
      roll: 3
      pitch: 4

    scales:
      surge: 1.0
      sway: 1.0
      heave: 1.0
      yaw: 1.0
      roll: 1.0
      pitch: 1.0

    deadzone: 0.05
